<!DOCTYPE html>
<html>
    <head>
        <title>Emulator for BBG Multimedia Student Computer</title>
    </head>
    <body>
        <canvas id="screen" width="512" height="480" tabindex="1"
                style="background-color: #000000;"></canvas>
        <p>
        <input id="diskname"></input>
        <br>
        <button onclick="start()">Start</button>
        <button onclick="stop()">Stop</button>
        <button onclick="request_pointer_lock()">Grab</button>
        <button onclick="request_fullscreen()">Fullscreen</button>
        </p>
        <textarea id="logarea" rows="10" cols="30" readonly></textarea>
        <script src="main.js"></script>
        <script>
            let inst = null;
            function start() {
                if (inst === null) {
                    inst = get_bbgmsc(document.getElementById('screen'));
                    const o = document.getElementById('logarea');
                    inst.set_logger(function (s) {
                        const len = o.value.length;
                        if (len > 40960)
                            o.value = o.value.substring(len - 40960, len) + s;
                        else
                            o.value += s;
                        o.scrollTop = o.scrollHeight;
                    });
                    const diskfile = document.getElementById('diskname').value;
                    inst.start(diskfile);
                }
            }

            function stop() {
                if (inst !== null) {
                    inst.stop();
                    inst = null;
                }
            }

            function request_pointer_lock() {
                screen = document.getElementById('screen');
                screen.tabIndex = 1;
                screen.focus();
                screen.requestPointerLock();
            }

            function request_fullscreen() {
                screen = document.getElementById('screen');
                screen.tabIndex = 1;
                screen.focus();
                screen.requestFullscreen();
                screen.style.cursor = 'none';
            }
        </script>
    </body>
</html>
